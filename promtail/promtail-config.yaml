server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.+)'
        target_label: 'container'
      # Cria um label 'service_name' extraindo o nome do serviço
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.+)-[0-9a-f]+'
        target_label: 'service_name'
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.+)'
        target_label: 'job'
    pipeline_stages:
      - json:
          expressions:
            level:          level
            message:        message
            traceId:        traceId
            spanId:         spanId
            logger_name:    logger_name
      - labels:
          level:
          service_name:
          traceId:
      - timestamp:
          source: '@timestamp'
          format: RFC3339