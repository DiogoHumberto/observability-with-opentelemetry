auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /tmp/loki
  ring:
    kvstore:
      store: inmemory
  replication_factor: 1

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  deletion_mode: disabled                  # substitui allow_deletes (depreciado)
  otlp_config:
    resource_attributes:
      attributes_config:
        - action: index_label
          attributes:
            - "service.name"               # transforma em label indexado

schema_config:
  configs:
    - from: 2023-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /tmp/loki/index
    cache_location: /tmp/loki/index_cache
  filesystem:
    directory: /tmp/loki/chunks

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100