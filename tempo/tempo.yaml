server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:                      # Collector envia via gRPC
          endpoint: 0.0.0.0:4317

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 24h          # retenção de 24 horas

metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /tmp/tempo/generator/wal

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/traces

overrides:
  metrics_generator_processors: ['service-graphs', 'span-metrics']